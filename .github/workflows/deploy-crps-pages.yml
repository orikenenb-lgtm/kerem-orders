name: Deploy CRPS presentation to GitHub Pages

on:
  push:
    branches: ["claude/crps-presentation-l4s6xm"]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish ONLY the presentation folder, so the rest of the repo
      # source is never exposed on the public site.
      - name: Upload presentation
        uses: actions/upload-pages-artifact@v3
        with:
          path: crps-presentation

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
