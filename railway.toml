# חלופה בלבד: קובץ זה נקרא רק אם מגדירים Root Directory = backend בשירות.
# מסלול ברירת המחדל הוא railway.json בשורש הריפו → backend/Dockerfile.
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
